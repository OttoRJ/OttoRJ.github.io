####Conceptos básicos para iniciar
- Los **datos** son la materia prima de la estadísitca

- Típicamente tenemos observaciones, medidas o conteos que son nuestros datos de estudio.


``` r
set.seed(1)
x1 &lt;- rnorm(10)
x1
```

```
##  [1] -0.6264538  0.1836433 -0.8356286  1.5952808  0.3295078 -0.8204684
##  [7]  0.4874291  0.7383247  0.5757814 -0.3053884
```
- Solemos tener registros de esos datos en tablas que luego podemos analizar.

- Un paso inicial suele ser generar un **arreglo ordenado** de los datos.

``` r
x1or &lt;- x1[order(x1)]# order te da el índice solamente
x1or
```

```
##  [1] -0.8356286 -0.8204684 -0.6264538 -0.3053884  0.1836433  0.3295078
##  [7]  0.4874291  0.5757814  0.7383247  1.5952808
```
- Otro paso importante puede ser generar una **tabla de datos** agrupados.

- Enseguida, podemos empezar a graficar para visualizar el comportamiento de nuestros datos.

####Tabla de frecuencias y frecuencias acumuladas

!['1'](Imagenes/1.jpg)
#####Frecuencia: Conteo de eventos en cada categoría
#####Frecuencia Acumulada: Se suman las categorías inferiores
#####Frecuencia relativa: se divide entre el total de eventos
#####Frecuencia relativa acumulada: se suma la anterior
---
####Tabla de frecuencias y frecuencias acumuladas en R
#####Generamos una tabla con unos datos simulados

``` r
x&lt;-runif(2000) #genera números random entre 0 y 1
k&lt;-nclass.Sturges(x) #calcula intervalos de clase
k
```

```
## [1] 12
```

``` r
intervalos &lt;- cut(x,breaks=k) #se generan los intervalos
FA &lt;- table(intervalos) #se genera la tabla de frec. absolutas
FR &lt;- prop.table(FA)
FR
```

```

####Distribuciones de probabilidad
- Tenemos distribuciones de probabilidad continuas (normal y otras) y discretas (Poisson y binomial).
- Las distribuciones discretas nos sirven para registrar datos de conteos de variables discretas.
- Las distribuciones continuas nos sirven para registrar datos de variables cuantitativas continuas.

####Ejemplo con probabilidad de Poisson
#####En dos épocas distintas del año, la concentración media de un pez es de 5 y 20 especímenes por km3, respectivamente. Grafica la probabilidad de encontrar en 20 muestras independientes 5 a 25 peces en cada caso.

``` r
x&lt;- 5:25; lambda &lt;- 5
plot(dpois(x, lambda),type="h", col="Blue",ylab = "P(X = x)")
lambda &lt;- 20
lines(dpois(x, lambda), type = "h", col = "green")
legend("topright", legend = c("5", "20"), col = c("Blue","Green"), lty=1)
```

&lt;img src="Estadistica1_files/figure-html/unnamed-chunk-31-1.png" style="display: block; margin: auto;" /&gt;
---
####Calcula la probabilidad de en cada caso, encontrar en una muestra más de 6 peces.

```

``` r

#####La concentración media de un patógeno en agua es de 15 por m3. Grafica la probabilidad de encontrar muestras independientes 10 a 20 en cada caso.

``` r
x&lt;- 10:20; lambda &lt;- 10
plot(dpois(x, lambda),type="h", col="blue",ylab = "P(X = x)")
y&lt;- 10:20; lambda &lt;- 20
lines(dpois(y, lambda),type = "h", col="green")
legend("topright", legend = c("15", "50"), col = c("Blue","Green"), lty=1)
```

#####Ejemplo:

``` r
# Rejilla de valores del eje X
x &lt;- 1:80
# n = 80, p = 0.2
plot(dbinom(x, size = 80, prob = 0.2), type = "h", lwd = 2, main = "Func. de prob. binomial",ylab = "P(X = x)", xlab = "Número de éxitos")
# n = 80, p = 0.3
lines(dbinom(x, size = 80, prob = 0.3), type = "h",
      lwd = 2, col = rgb(1,0,0, 0.7))
legend("topright", legend = c("80  0.2", "80  0.3"),
       title = "n     p", title.adj = 0.85,lty = 1, col = 1:3, lwd = 2, box.lty = 0)
```
